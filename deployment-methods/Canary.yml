# 4. Canary Deployment (Old Version)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-old
spec:
  replicas: 9
  selector:
    matchLabels:
      app: canary-app
      version: old
  template:
    metadata:
      labels:
        app: canary-app
        version: old
    spec:
      containers:
        - name: app
          image: nginx:1.20
          ports:
            - containerPort: 80

---
# Canary New Version
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-new
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canary-app
      version: new
  template:
    metadata:
      labels:
        app: canary-app
        version: new
    spec:
      containers:
        - name: app
          image: nginx:1.21
          ports:
            - containerPort: 80